<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>
    
   
    <script src="https://unpkg.com/@codans/trello"></script>

</head>

<body>
    <img src="img/trello.svg" width="200px" alt="Logo trello">

    <h1>Fazer Logim no Trello</h1>

      <form action="" method="get">
          <input type="text" name="email"  placeholder="Insira a seu email">
            
          <input type="text" name="senha"  placeholder="Insira a sua senha">
                   
          <input type="submit" value="Fazer login">
            
        <span>ou</span>

      
            
        <button>
          <img src="img/google.svg" width="20px" alt="Google">
          Continuar com o google
        </button>

        <button>
          <img src="img/microsoft.svg" width="20px" alt="Microsoft">
          Continuar com a Microsoft
        </button>

        <button>
          <img src="img/apple.svg" width="20px" alt="Apple">
          Continuar com a Apple
        </button>

        <button>
          <img src="img/slack.svg" width="20px" alt="Slack">
          Continuar com o Slack
        </button>
    </form> 



      <img src="img/atlassian.svg" width="200px" alt="Atlassian">
      <img src="img/analytics.svg" width="200px" alt="Analytics">
      <img src="img/interactive.svg" width="200px" alt="Atlassian"> 
    
</body>

</html>
