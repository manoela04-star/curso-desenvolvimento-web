<body>

    <h2>Login</h2>

    <form>

        Login:<br>

        Senha:<br>

    <!--Para fazer um botão-->

        <input type="button" value="enviar">

        <!--"button" não é a meneira correta de enviar um formulario

        -->
     




    </form>
