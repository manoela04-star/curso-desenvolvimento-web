<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes e Cores </title>


    <style>
        .formataçao{
            color:#0EB426;
            font-size: 30px; /* font-size tamanaho da fonte*/
            background: #808080; /* define a cor de fundo */
            font-family: 'Times New Roman', Courier, monospace, serif; /*Define uma familia de fontes*/
        }
    </style>

</head>



<body> 
    <h1 class="formataçao">Cabeçalo</h1>
    <p>Lorem ipsum dolor sit amet.</p> 
</body>

</html>
