<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamanhos e textos</title>


    <style type="text/css">

        div{
            font-size: 15px;
        }

        .texto{
            /*
            px -> tamanho fixo
            % -> tamanho relativo ao padrão do browse
            em -> tamanho relativo ao container pai | Mais usado para tamanhos relativos
            */
            /*font-size: 32px;*/ /* Seria o mesmo que 200%*/
            font-size: 2em;
        }    
        
        .texto2{
            font-size: 1em;
        }

    </style>

</head>



<body> 

    <div>
        <p class="texto"> Conteudo 1 </p>
        <p class="texto2">Conteudo 2</p>
    </div>
  

</body>

</html>
