<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Divs e Spam</title>

    <style type="text/css">

        #topo{
            background: yellow;
        }

        #conteudo{
            background: blue;
        }

        #rodape{
            background: blue;
            color: yellow;
        }

        .produto{
            background: yellow;
            margin: 10px;
    
    
        }

    </style>

</head>

<body>

    <div id="topo">
        <img src="imagens/mecado-livre-logo.png" width="250">
        <ul>
            <li>Home</li>
            <li>Produtos</li>
            <li>Contato</li>
        </ul>
  </div>

  <div id="conteudo">

        <div class="produto">
            Produto 1
        </div>

        <div class="produto">
            Produto 2
        </div>

        <div class="produto">
            Produto 3
        </div>

  </div>

  <div id="rodape">
        Todos os direitos reservados.
  </div>

  <span id="rodape">
        promoçao 
  </span>

  <span> Frete gratis</span>

  <span id="rodape">full entrega</span>


</body>

</html>

<!--Para aplicar formataçoes especificas em textos
o recomendado é utilizar o "span"-->
