<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap fundamentos</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
  
    </head>
  <body>


    <div class="container">

        <!-- classes de largura (width) -->
      <div class="bg-primary w-25">width 25%</div>
      <div class="bg-primary w-50">width 50%</div>
      <div class="bg-primary w-75">width 75%</div>
      <div class="bg-primary w-100">width 100%</div>
      <div class="bg-warning w-auto">width auto</div>

      <br>
      <br>

      <!-- classes de altura -->
      <div style="height: 300px;border: 1px solid gray;">
          <div class="bg-warning d-inline-block h-25">height 25%</div>
          <div class="bg-warning d-inline-block h-50">height 50%</div>
          <div class="bg-warning d-inline-block h-75">height 75%</div>
          <div class="bg-warning d-inline-block h-100">height 100%</div>
          <div class="bg-success d-inline-block h-auto">height auto</div>
      </div>

      <br>
      <br>

      <!-- Bordas
      border        -> todas as bordas
      border-top    -> borda superior
      border-bottom -> borda inferior
      border-end  -> bordar fim/direita
      border-start   -> borda início/esquerda

      Cores de bordas
      border-<cor>: primary, secondary, success, 
          info, warning, danger, light, dark, white
      -->
      <div class="bg-white mb-2 border border-primary">todas as bordas</div>
      <div class="bg-white mb-2 border-top border-dark">borda superior</div>
      <div class="bg-white mb-2 border-bottom border-danger">borda inferior</div>
      <div class="bg-white mb-2 border-end border-info">borda direita</div>
      <div class="bg-white mb-2 border-start border-warning">borda esquerda</div>

      <br>
      <br>

      <!-- Border Radius 
      opções: rounded, rounded-top, rounded-start, 
              rounded-end, rounded-circle
      -->
      <div class="bg-light mb-2 border rounded">rounded</div>
      <div class="bg-light mb-2 border rounded-top">rounded top</div>
      <div class="bg-light mb-2 border rounded-bottom">rounded bottom</div>
      <div class="bg-light mb-2 border rounded-start">rounded início/esquerda</div>
      <div class="bg-light mb-2 border rounded-end">rounded fim/direita</div>
      <div class="bg-light mb-2 p-5 border w-25 rounded-circle">rounded circle</div>

      <br>
      <br>

    </div>


    <script src="js/bootstrap.bundle.min.js"></script>
  </body>
</html>
