<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulários</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
  
    </head>
  <body>
    <div class="container py-3">

        <!-- formulários 
        Espaçamento: mb-<valor>
        classe: form-control-<opcoes>
            opções: sm,md, lg
        -->
        <form>
            
            <!-- caixas de texto
              form-label, form-control, form-text -->
            <div class="mb-3">
                <label class="form-label" for="usuario">Usuário</label>
                <input class="form-control" type="text" id="usuario" placeholder="Digite seu usuário">
            </div>

            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control"
                type="email" id="email" 
                placeholder="Digite seu email" readonly>
                <small>Email será validado</small>
            </div>

            <!-- select
             form-select -->
            <div class="mb-3">
                <label class="form-label" for="estados">Estados</label>
                <select id="estados form-select">
                    <option>Acre</option>
                    <option>Alagoas</option>
                    <option>Amapá</option>
                    <option>...</option>
                </select>
            </div>

            <!-- textarea
              form-label e  form-control -->
            <div class="mb-3">
                <label class="form-label" for="mensagem">Mensagem</label>
                <textarea class="form-control" id="mensagem" rows="3"></textarea>
            </div>


            <!-- file input
            form-label e  form-control-->
            <div class="mb-3">
                <label class="form-label" for="arquivo">Arquivo</label>
                <input class="form-control" type="file" id="arquivo">
            </div>


            <!-- range
            form-range 
            -->
            <div class="mb-3">
                <label class="form-label" for="range">Satisfação</label>
                <input class="form-range" type="range" 
                id="range" min="1" max="5">
            </div>


            <!-- Checkbox 
             form-check - form-switch
            form-check-input e form-check-label
            -->
            <div class="mb-3 form-switch">
                <input class="form-check-input" type="checkbox" value="" id="aceito">
                <label class="form-check-label" for="aceito">
                    Aceito os termos de uso
                </label>
            </div>

            <!-- Radiobutton
             form-check-input e form-check-label
            -->
             <div class="mb-3">
                <input class="form-check-input" type="radio" name="pagamento" id="cartao" value="credito">
                <label class="form-check-label" for="cartao">
                Cartão de Crédito
                </label>
            </div>

            <div>
                <input type="radio" name="pagamento" id="pix" value="pix">
                <label for="pix">
                PIX
                </label>
            </div>
            <br>

            <!-- button -->
            <input class="btn btn-primary" type="submit" value="Salvar">

        </form>
        <br><br>

        <!-- Formulário inline -->
        <form class="d-flex">
            <input class="form-control me-1" type="text" placeholder="Digite seu usuário">
            <input class="form-control me-1" type="password" placeholder="Digite sua senha">
            <input class="btn btn-primary"  type="submit" value="Logar">
        </form>
        <br><br>

        <!-- 
        Validação de formulário 
        Classes: 
            is-valid, is-invalid, 
            invalid-feedback, valid-feedback
        -->
        <form>
            
            <div>
                <label class="form-label" for="email-usuario">email</label>
                <input class="form-control is-valid" type="text" id="email-usuario" placeholder="Digite seu e-mail">
                <div class="valid-feedback">
                    E-mail válido
                </div>
            </div>

            <div>
                <label class="form-label" for="senha-usuario">Senha</label>
                <input class="form-control is-invalid" type="email" id="senha-usuario" placeholder="Digite sua senha">
                <div class="invalid-feedback">
                    Senha inválida
                </div>
            </div>

            <input class="btn btn-primary" type="submit" value="Logar">

        </form>
    
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
  </body>
</html>
