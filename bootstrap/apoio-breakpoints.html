        Alinhamento responsivo - text-<breakpoint>-<alinhamento>
            breakpoint: sm, md, lg, xl
            alinhamento: start, center, end
            Mobile first
     -->

    <br>
    <br>

    <!-- Elemento Block para inline -->

    <span>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</span>

    <br>
    <br>

    <!-- Elemento Inline para Block -->
    <span class="bg-warning">Lorem ipsum dolor</span>
    <span>Lorem ipsum dolor 2</span>

    <br>
    <br>




    

    <script src="js/bootstrap.bundle.min.js"></script>
