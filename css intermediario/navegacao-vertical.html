<!DOCTYPE html>
<html lang="pt-br ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Navegaçao Vertical</title>

    <style>

        #menu ul{
            list-style-type: none;
            padding: 0;
            width: 200px;
        }

        #menu li a{
            display: block;
            padding: 0.5em 1.5em;
            color: black;
            text-decoration: none;
            background: #f7b600 url("img/seta.png") no-repeat 8px center
        }

         #menu li a:hover{
            padding-left: 2.5em;
            color: white;
            
            background: #f99200 url("img/seta.png") no-repeat 1.5em center;
        }

        #menu li a:active{
            background-color: #885000;
        }

    </style>

</head>

<body>
    <h1>Meneu de Navegaçao</h1>

    <div id="menu">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Produto</a></li>
            <li><a href="#">Carrinho</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </div>

</body>

</html>
